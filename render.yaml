services:
  # Backend API
  - type: web
    name: jira-ai-assistant-api
    runtime: python
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jira-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://jira-ai-assistant-frontend.onrender.com
      - key: DEBUG
        value: false

  # Frontend (static site)
  - type: web
    name: jira-ai-assistant-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://jira-ai-assistant-api.onrender.com

databases:
  - name: jira-ai-db
    databaseName: jira_ai_assistant
    user: jira_ai_user
